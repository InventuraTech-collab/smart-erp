<svg width="100%" viewBox="0 0 680 300" role="img" style="" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AIS Advanced Information System Logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AIS logo with orange letter a, dark red letter s, and full company name in Arabic and English</desc>

  <!-- Orange circular "a" -->
  <g transform="translate(200, 60)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Orange circle shape for "a" -->
    <path d="M60,10 A55,55 0 1,0 60,120 L60,95 A30,30 0 1,1 60,35 L60,10 Z" fill="#F47920" style="fill:rgb(244, 121, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Inner cutout for "a" -->
    <circle cx="60" cy="65" r="18" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Vertical stroke on right of "a" -->
    <rect x="90" y="10" width="20" height="110" rx="8" fill="#F47920" style="fill:rgb(244, 121, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Dark red "S" with cursor arrow -->
  <g transform="translate(295, 55)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- S shape using path -->
    <path d="M55,15 C30,15 10,30 10,50 C10,70 30,78 55,85 C80,92 95,100 95,120 C95,140 75,155 50,155 C30,155 12,145 5,130" fill="none" stroke="#8B1A1A" stroke-width="24" stroke-linecap="round" style="fill:none;stroke:rgb(139, 26, 26);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Cursor/arrow pointer on top right of S -->
    <polygon points="88,8 105,50 95,44 90,62 82,58 87,40 77,46" fill="#8B1A1A" style="fill:rgb(139, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Arabic text -->
  <text x="340" y="220" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="500" fill="#4A4A4A" direction="rtl" style="fill:rgb(74, 74, 74);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, Arial, sans-serif;font-size:22px;font-weight:500;text-anchor:middle;dominant-baseline:auto">المتقدمة لنظم المعلومات</text>

  <!-- English text -->
  <text x="340" y="255" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#4A4A4A" style="fill:rgb(74, 74, 74);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, Arial, sans-serif;font-size:18px;font-weight:400;text-anchor:middle;dominant-baseline:auto">
    <tspan fill="#F47920" font-weight="600" style="fill:rgb(244, 121, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, Arial, sans-serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto">A</tspan>dvanced 
    <tspan fill="#F47920" font-weight="600" style="fill:rgb(244, 121, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, Arial, sans-serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto"> I</tspan>nformation 
    <tspan fill="#F47920" font-weight="600" style="fill:rgb(244, 121, 32);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, Arial, sans-serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto"> S</tspan>ystem
  </text>
</svg>